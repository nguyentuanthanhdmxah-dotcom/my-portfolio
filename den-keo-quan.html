<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đèn kéo quân</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #111; color: white; text-align: center; }

        .scene {
            width: 300px;
            height: 300px;
            margin: 100px auto;
            perspective: 1000px;
        }

        .carousel {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 10s infinite linear;
        }

        .carousel img {
            position: absolute;
            width: 200px;
            height: 200px;
            left: 50px;
            top: 50px;
            border-radius: 10px;
        }

        .carousel img:nth-child(1) { transform: rotateY(0deg) translateZ(250px); }
        .carousel img:nth-child(2) { transform: rotateY(60deg) translateZ(250px); }
        .carousel img:nth-child(3) { transform: rotateY(120deg) translateZ(250px); }
        .carousel img:nth-child(4) { transform: rotateY(180deg) translateZ(250px); }
        .carousel img:nth-child(5) { transform: rotateY(240deg) translateZ(250px); }
        .carousel img:nth-child(6) { transform: rotateY(300deg) translateZ(250px); }

        @keyframes rotate {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }
    </style>
</head>
<body>

<h1>Đèn Kéo Quân 🎠</h1>

<div class="scene">
    <div class="carousel" id="carousel">
        <img src="https://picsum.photos/200?1">
        <img src="https://picsum.photos/200?2">
        <img src="https://picsum.photos/200?3">
        <img src="https://picsum.photos/200?4">
        <img src="https://picsum.photos/200?5">
        <img src="https://picsum.photos/200?6">
    </div>
</div>

<script>
    const carousel = document.getElementById("carousel");

    carousel.addEventListener("mouseover", () => {
        carousel.style.animationPlayState = "paused";
    });

    carousel.addEventListener("mouseout", () => {
        carousel.style.animationPlayState = "running";
    });
</script>

</body>
</html>
